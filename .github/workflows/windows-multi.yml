name: windows-multi

on:
  workflow_dispatch:      # 仅支持手动触发，不影响原有 tag 触发逻辑

jobs:
  windows-multi:
    strategy:
      fail-fast: false
      matrix:
        ver:
          - { cv: 4.8.1 }
        list:
          - { win_ver: 2019, vs_name: vs2015, vs_ver: v140 }
          - { win_ver: 2019, vs_name: vs2017, vs_ver: v141 }
          - { win_ver: 2019, vs_name: vs2019, vs_ver: v142 }
          - { win_ver: 2022, vs_name: vs2022, vs_ver: v143 }
        crt: [md, mt]
        build_type: [Debug, Release, RelWithDebInfo]

    runs-on: windows-${{ matrix.list.win_ver }}
    name: windows-${{ matrix.list.vs_name }}-${{ matrix.crt }}-${{ matrix.build_type }}

    env:
      PKG_NAME: opencv-${{ matrix.ver.cv }}-windows-${{ matrix.list.vs_name }}-${{ matrix.crt }}-${{ matrix.build_type }}

    steps:
      - uses: actions/checkout@v3

      - name: checkout opencv
        uses: actions/checkout@v3
        with:
          repository: opencv/opencv
          path: opencv-${{ matrix.ver.cv }}
          ref: ${{ matrix.ver.cv }}
          submodules: recursive

      - name: copy
        run: |
          cp build-opencv4-multi.bat opencv-${{ matrix.ver.cv }}
          cp opencv4_cmake_options.txt opencv-${{ matrix.ver.cv }}

      - name: build
        run: |
          cd opencv-${{ matrix.ver.cv }}
          ./build-opencv4-multi.bat ${{ matrix.list.vs_ver }} ${{ matrix.crt }} ${{ matrix.build_type }}

      - name: 7zip
        run: |
          cp -r opencv-${{ matrix.ver.cv }}/build-x64-${{ matrix.list.vs_ver }}-${{ matrix.crt }}-${{ matrix.build_type }}/install windows-x64
          cp -r opencv-${{ matrix.ver.cv }}/build-Win32-${{ matrix.list.vs_ver }}-${{ matrix.crt }}-${{ matrix.build_type }}/install windows-x86
          7z a ${{ env.PKG_NAME }}.7z windows-x64 windows-x86
          rm windows-x64 -r -fo
          rm windows-x86 -r -fo

      - name: upload
        uses: actions/upload-artifact@v3
        with:
          name: ${{ env.PKG_NAME }}
          path: ${{ env.PKG_NAME }}.7z

  # 注意：新工作流没有 release job，产物只作为 workflow artifact 手动下载
  # 如需自动发布，可自行添加类似 release job（但会与原有 release 逻辑冲突，建议手动发布）
